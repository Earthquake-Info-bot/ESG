<script>
const isAppTest = false;

let fetchInterval = 3;
let updateMethod = "fetch";
let timer;
let isGenerating = false;
function updateTime(){
  const now = new Date();
  const week = ['日','月','火','水','木','金','土'];
  const y = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const w = week[now.getDay()];
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('date').textContent =`${y}/${mo}/${d}(${w})`;
  document.getElementById('time').textContent =`${h}:${m}:${s}`;
}
setInterval(updateTime, 1000);
updateTime();
</script>
<script>
function showMessage(text, bgColor="#3498db", textColor="#fff", sec=5){
  const el = document.getElementById("toast");
  const txt = document.getElementById("toastText");
  txt.textContent = text;
  el.dataset.text = text; // コピー用
  el.style.background = bgColor;
  el.style.color = textColor;
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => {
    el.classList.remove("show");
  }, sec * 1000);
}

if (isAppTest===true) {
  alert("製作・テスト中です。\n実際のデータは表示していません。");
  showMessage("テストデータを表示しています。", "#3498db", "#fff", 5);
}
</script>

function formatDateTimeWithMs(date = new Date()) {
  const y = date.getFullYear();
  const mo = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  const h = String(date.getHours()).padStart(2, "0");
  const m = String(date.getMinutes()).padStart(2, "0");
  const s = String(date.getSeconds()).padStart(2, "0");
  const ms = String(date.getMilliseconds()).padStart(3, "0");
  return `${y}/${mo}/${d} ${h}:${m}:${s}.${ms}`;
}
function formatHHmm(str) {
  const match = str.match(/(\d{2}):(\d{2}):\d{2}/);
  if (!match) return "先ほど";
  return `${match[1]}時${match[2]}分頃`;
}

const areaOrderIndex = new Map(
  AREA_ORDER.map((name, idx) => [name, idx])
);
function sortByAreaOrder(a, b) {
  const ia = areaOrderIndex.has(a) ? areaOrderIndex.get(a) : Infinity;
  const ib = areaOrderIndex.has(b) ? areaOrderIndex.get(b) : Infinity;
  return ia - ib;
}
function applyHypoRuby(text){
  for (const [key, ruby] of Object.entries(hypoRuby)) {
    if (text.includes(key)) {
      text = text.replaceAll(key, `${key}（${ruby}）`);
    }
  }
  return text;
}

function parseDate(str) {
  const [date, time] = str.split(" ");
  const [y, m, d] = date.split("/").map(Number);
  const [h, mi, s] = time.split(":").map(Number);
  return new Date(y, m - 1, d, h, mi, s);
}

/* 緊急地震速報（警報） */
async function loadEEWWarning(data){
  if (isLoading) return;
  setLoading(true);

  try{
    if (!data) {
      const res = await safeFetch(url_loadEEWWarning);
      if (res.ok) {
        setFooter(`<span style="color:#00e676">●</span>正常(P2P)／最終更新 ${formatDateTimeWithMs()}`,null);
      } else {
        setFooter(`<span style="color:#ffb300">●</span>HTTP${res.status}エラー(P2P)／試行時刻 ${formatDateTimeWithMs()}`,null);
        setScript(`読み込みでHTTP${res.status}エラーが発生しました。`);
        return;
      }
      const json = await res.json();
      data = json[0];
      if (!data) {
              setScript("現在、緊急地震速報（警報）は発表されていません。");
        return;
      }
    } else {
      setFooter(null,`<span style="color:#00e676">●</span>正常(P2P)／受信日時 ${formatDateTimeWithMs()}`);
    }

    if (data.cancelled === true) {
      announceDT = null;
      setScript(`<span style="color:yellow">《重要》二重EEWの片方のみキャンセルでないかを必ず確認</span>

新しい情報です。

この緊急地震速報は取り消されました。
強い揺れの心配はありません。

繰り返します、緊急地震速報はキャンセルされました。`)
      return;
    }

    const eewAreas = [...new Set(data.areas.map(area => area.pref))];
    eewAreas.sort((a, b) => {
      const ia = regionOrder.indexOf(a);
      const ib = regionOrder.indexOf(b);
      return (ia === -1 ? Infinity : ia) - (ib === -1 ? Infinity : ib);
    });

    const hypo = data.earthquake.hypocenter.reduceName;

    const titleText = isAppTest ? "これは試験画面です。" : `緊急地震速報　${hypo}で地震`;

    announceDT = data.issue.time;
    const elapsedSec = Math.floor(
      (Date.now() - parseDate(data.issue.time).getTime()) / 1000
    );
    if (elapsedSec > 900) {
      setScript("現在、緊急地震速報（警報）は発表されていません。\n（発表から15分以上経過したので表示終了）");
      announceDT = null;
      return;
    }

    setScript(`<span class="marker-red">${titleText}</span>
<span style="color:cyan">${data.issue.time} 発表（第${data.issue.serial}報）<br><span id="announce">（発表から--分--秒経過）</span></span>
    
緊急地震速報です。
<div class="yellow-box">${eewAreas.join("、")}</div>では、強い揺れに警戒してください。

姿勢を低くして頭を守ってください。倒れてくるものや落下物に充分注意してください。
慌てて屋外へ飛び出したり、階段を駆け降りたりすると、転倒などによる思わぬ怪我をするおそれがあります。
落ち着いて身の安全を確保してください。

緊急地震速報です。${eewAreas.join("、")}では強い揺れに警戒してください。

落ち着いて身の安全を確保してください。
エレベーターに乗っている場合は、全ての階のボタンを押して、最寄りの階で降りてください。
閉じ込められた場合は、無理な脱出は試みないでください。
車を運転中の場合は、ゆっくりブレーキを踏んで路肩に停車してください。

/* Wolfxの緊急地震速報 */
async function loadEEWForecast(){
  if (isLoading) return;
  setLoading(true);

  try{
    const res = await safeFetch(url_loadEEWForecast);
    if (res.ok) {
      setFooter(`<span style="color:#00e676">●</span>正常(Wolfx)／最終更新 ${formatDateTimeWithMs()}`,null);
    } else {
      setFooter(`<span style="color:#ffb300">●</span>HTTP${res.status}エラー(Wolfx)／試行時刻 ${formatDateTimeWithMs()}`,null);
      setScript(`読み込みでHTTP${res.status}エラーが発生しました。`);
      return;
    }
    const eewData = await res.json();
    if (!eewData) {
      setScript("緊急地震速報のデータがありません。");
      return;
    }
    let notice = "";
    const int = eewData.MaxIntensity || "不明";
    if (int==="1" || int==="2") {
      showMessage(`推定震度3未満のEEW予報は、原則アナウンスは不要です。`);
    } else if(int==="3") {
      notice = "\n揺れに注意してください。";
    } else if(int==="4") {
      notice = "\n次の地域では、やや強い揺れに注意してください。";
    } else if(int==="5弱" || int==="5強" || int==="6弱" || int==="6強" || int==="7") {
      notice = "\n強い揺れに警戒してください。姿勢を低くして頭を守ってください。"
    } else {
      notice = "\n推定最大震度は不明です。今後の情報に注意してください。新しい情報が入り次第お伝えします。"
      if (Number(eewData.Depth) >= 150) {
        notice = "\n深発地震のため、最大震度の推定はありません。震源から遠く離れたところが強く揺れる可能性もありますので、念のため揺れに注意してください。"
      }
    }
    const originTime = formatHHmm(eewData.OriginTime);

    let hypo = eewData.Hypocenter;
    for (const [key, ruby] of Object.entries(hypoRuby)) {
      if (hypo.includes(key)) { hypo = hypo.replace(key, `${key}（${ruby}）`); }
    }
    if (eewData.isAssumption===true) {
      if (eewData.isWarn===false && int==="5弱") {
        const baseHypo = hypo;

        hypo += ` で大きな加速度が検出されたもようです。
${baseHypo}では大きな揺れが発生している可能性があります。
念のため強い揺れに警戒してください。
今後の情報に十分注意してください。`;
      } else {
        hypo += ` で揺れが検出されたもようです。
推定最大震度は${int}です。${notice}`;
      }
    } else {
      hypo += ` で地震が発生したもようです。
推定最大震度は${int}です。${notice}`;
    }

    const hasMagnitude =
      eewData.Magunitude !== undefined &&
      eewData.Magunitude !== null &&
      eewData.Magunitude !== "";
    const hasDepth =
      eewData.Depth !== undefined &&
      eewData.Depth !== null &&
      eewData.Depth !== "";

    const magnitude = hasMagnitude ? `マグニチュード${eewData.Magunitude}` : null;
    const depth = hasDepth ? `${eewData.Depth}` : null;
    const isTsunami = eewData.isSea && (Number(eewData.Magnitude)>=6.0) && (Number(eewData.Depth)<=60);

    let hypos = "";
    if (!eewData.isAssumption) {
      if (hasMagnitude && hasDepth) {
        hypos = `\n\n震源情報です。地震の規模は${magnitude}、震源の深さは${depth}キロメートルと推定されています。`;
      } else if (hasMagnitude) {
        hypos = `\n\n震源情報です。地震の規模は${magnitude}と推定されています。震源の深さは不明です。`;
      } else if (hasDepth) {
        hypos = `\n\n震源情報です。地震の規模を示すマグニチュードは不明です。震源の深さは${depth}キロメートルと推定されています。`;
      } else {
        hypos = "\n\n震源情報です。地震の規模を示すマグニチュードと震源の深さはいずれも不明です。";
      }
    } else {
      hypos = "\n\n震源情報です。地震の規模を示すマグニチュードと震源の深さはいずれも不明です。";
    }

    let esi = "";
    if (eewData.WarnArea && eewData.WarnArea.length > 0) {
      const int7  = []; const int6p = []; const int6m = [];
      const int5p = []; const int5m = []; const int4  = [];
      const int3  = []; const int2  = []; const int1  = [];
      const int0  = []; // 震度不明・その他

      // ▼ 対象地域（詳細）：元データ順 + 予想震度
      for (const area of eewData.WarnArea) {
        const shindo = area.Shindo1;

        switch (shindo) {
          case "7": int7.push(applyHypoRuby(area.Chiiki)); break;
          case "6強": case "6+": int6p.push(applyHypoRuby(area.Chiiki)); break;
          case "6弱": case "6-": int6m.push(applyHypoRuby(area.Chiiki)); break;
          case "5強": case "5+": int5p.push(applyHypoRuby(area.Chiiki)); break;
          case "5弱": case "5-": int5m.push(applyHypoRuby(area.Chiiki)); break;
          case "4": int4.push(applyHypoRuby(area.Chiiki)); break;
          case "3": int3.push(applyHypoRuby(area.Chiiki)); break;
          case "2": int2.push(applyHypoRuby(area.Chiiki)); break;
          case "1": int1.push(applyHypoRuby(area.Chiiki)); break;
          default: int0.push(applyHypoRuby(area.Chiiki));
        }
      }

      // ▼ ここで地域順ソート
      int7 .sort(sortByAreaOrder);
      int6p.sort(sortByAreaOrder);
      int6m.sort(sortByAreaOrder);
      int5p.sort(sortByAreaOrder);
      int5m.sort(sortByAreaOrder);
      int4 .sort(sortByAreaOrder);
      int3 .sort(sortByAreaOrder);
      int2 .sort(sortByAreaOrder);
      int1 .sort(sortByAreaOrder);
      int0 .sort(sortByAreaOrder);

      if (int7.length)  esi += "◆推定震度7の地域は以下の通りです◆\n　" + int7.join("、") + "\n";
      if (int6p.length) esi += "◆推定震度6強の地域は以下の通りです◆\n　" + int6p.join("、") + "\n";
      if (int6m.length) esi += "◆推定震度6弱の地域は以下の通りです◆\n　" + int6m.join("、") + "\n";
      if (int5p.length) esi += "◆推定震度5強の地域は以下の通りです◆\n　" + int5p.join("、") + "\n";
      if (int5m.length) esi += "◆推定震度5弱の地域は以下の通りです◆\n　" + int5m.join("、") + "\n";
      if (int4.length)  esi += "◆推定震度4の地域は以下の通りです◆\n　" + int4.join("、") + "\n";
      if (int3.length)  esi += "◆推定震度3の地域は以下の通りです◆\n　" + int3.join("、") + "\n";
      if (int2.length)  esi += "◆推定震度2の地域は以下の通りです◆\n　" + int2.join("、") + "\n";
      if (int1.length)  esi += "◆推定震度1の地域は以下の通りです◆\n　" + int1.join("、") + "\n";
      if (int0.length)  esi += "◆推定震度が不明な地域は以下の通りです◆\n　" + int0.join("、") + "\n";
      esi = esi.trim();
    }

    setScript(`${esi ? `<div class="yellow-box">${esi}</div>\n` : ""}ここで地震の情報です。

${originTime}、${hypo}${hypos}${isTsunami ? "また、この地震により津波が発生する可能性があります。沿岸で長く強い揺れを感じた場合は、念のため海や川から離れてください。今後の情報に十分注意してください。" : ""}

<span style="font-size:16px; color:#f8f8f8">発表日時　${eewData.AnnouncedTime}</span>`);
  } finally {
    setLoading(false);
  }
}

function restoreState(){
  // 設定取得
  updateMethod = localStorage.getItem("updateMethod") || "fetch";
  fetchInterval = Number(localStorage.getItem("fetchInterval") || 5);
  autoTabSwitch = localStorage.getItem("autoTabSwitch") !== "false";
  // UI反映
  document.getElementById("updateMethod").value = updateMethod;
  document.getElementById("fetchInterval").value = fetchInterval;
  document.getElementById("autoTabSwitch").checked = autoTabSwitch;
  // fetch UI状態更新
  updateFetchInput(false);
  // fetch動作復帰
  applyUpdateMethod();
  // WebSocket復帰
  connectWS();
}
function applyUpdateMethod(){
  if (timer) clearInterval(timer);

  if (updateMethod === "fetch") {
    fetch_setInterval();
  }
}
/* 初期表示 */
window.onload = () => {
  restoreState();

  const firstButton = document.querySelector(".menu-btn");
  selectMenu(firstButton,"eew_warning");
};

document.getElementById("fetchInterval").addEventListener("change", () => {
  fetchInterval = Number(document.getElementById("fetchInterval").value);
  localStorage.setItem("fetchInterval", fetchInterval);
  applyUpdateMethod();
});
document.getElementById("autoTabSwitch").addEventListener("change", () => {
  autoTabSwitch = document.getElementById("autoTabSwitch").checked;
  localStorage.setItem("autoTabSwitch", autoTabSwitch);
});

function fetch_setInterval() {
  if (timer) clearInterval(timer);
  if (updateMethod !== "fetch") return;

  timer = setInterval(() => {
    if (currentMode === "admin") return;
    runCurrentMode();
  },fetchInterval * 1000);
}

window.onerror = function(message, source, lineno, colno, error){
  showMessage(
    `[JSエラー]\n${message}\n${source}:${lineno}:${colno}`,
    "#e74c3c",
    "#fff",
    10
  );
};

window.addEventListener("unhandledrejection", function(event){
  showMessage(
    `[Promise未処理エラー]\n${event.reason}`,
    "#e74c3c",
    "#fff",
    10
  );
});

function copyToast(){
  const el = document.getElementById("toast");
  const text = el.dataset.text || "";
  navigator.clipboard.writeText(text)
    .then(() => {
      showMessage("トーストメッセージをコピーしました", "#2ecc71", "#000", 1.5);
    })
    .catch(() => {
      showMessage("コピー失敗", "#e74c3c", "#fff", 2);
    });
}
//ws処理
let ws;
let reconnectTimer = null;
function connectWS() {
  if (ws) {
    ws.onclose = null;
    ws.close();
  }
  ws = new WebSocket(url_ws);
  ws.onopen = () => {
    console.log("WS接続");
    setFooter(null, '<span style="color:#00e676">●</span>正常');
    showMessage("WebSocketに接続しました。","#00c853","#fff",2);
  };
  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (!data) return;
      if (data.code===556) {//緊急地震速報（警報）
        if (lastEEWEventId === data.issue.eventId) {
          if (currentMode === 'eew_warning') {
            loadEEWWarning(data);
          };
          return;
        } else {
          lastEEWEventId = data.issue.eventId;
          if (autoTabSwitch===false) {
            if (currentMode === 'eew_warning') {
              loadEEWWarning(data);
            }
            return;
          };
        }
        currentMode = "eew_warning";
        document.querySelectorAll(".menu-btn").forEach(btn => {
          btn.classList.remove("active");
        });
        document.querySelector('.menu-btn[data-mode="eew_warning"]').classList.add("active");
        document.getElementById("title").textContent = titles.eew_warning || "-";
        document.getElementById("headerControls").innerHTML = headerControls.eew_warning || "";
        loadEEWWarning(data);
        showMessage("緊急地震速報（警報）が発表されたため、タブを切り替えました。","#ffb300","#000",5);
      }
      if (data.code===552) {//津波予報
        //
      }
    } catch (e) {
      showMessage("[WebSocket ERROR]\n"+ e,"#e74c3c","#fff",5);
    }
  };
  ws.onerror = (err) => {
    console.error(err);
    setFooter(null, '<span style="color:#ff5252">●</span>エラー');
    showMessage(`WebSocket通信エラー\n${String(err)}`,"#e74c3c","#fff",5);
  };
  ws.onclose = () => {
    setFooter(
      null,
      '<span style="color:#ffb300">●</span>切断・再接続を試行中'
    );
    showMessage("WebSocketとの接続が切断されました。\n再接続します。","#ffb300","#000",3);
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 1500);
  };
}
setInterval(() => {
  const el = document.getElementById("announce");
  if (!el || !announceDT) return;

  const elapsedSec = Math.floor(
    (Date.now() - parseDate(announceDT).getTime()) / 1000
  );

  const min = Math.floor(elapsedSec / 60);
  const sec = elapsedSec % 60;

  el.textContent = `（発表から${min}分${sec}秒経過）`;
}, 1000);
</script>
<div id="toast" class="toast">
  <span id="toastText"></span>
  <button id="toastCopyBtn" onclick="copyToast()" title="コピー">📋</button>
</div>
</body>
</html>
