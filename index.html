<style>
*{
  box-sizing:border-box;
}
html,
body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#1b1b1b;
  color:white;
}

.app{
  display:flex;
  width:100%;
  height:100dvh;      /* ←100vhじゃなく100dvh */
  min-height:100dvh;
}
/* メイン */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:0; /* ←これ追加 */
}
/* 上部 */
.header{
  height:74px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 14px;
  background:#262626;
  border-bottom:2px solid #444;
  flex-shrink:0
}

/* 左 */
.header-left{
  flex-shrink:0;
}
/* 時刻 */
.time-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}
.time-text{
  display:flex;
  flex-direction:column;
}
.date{
  font-size:12px;
  color:#ccc;
}
.time{
  font-size:26px;
  font-weight:bold;
  line-height:1.1;
}
/* 手動更新 */
.refresh-btn{
  width:64px;
  height:56px;
  border:none;
  border-radius:10px;
  background:#4b5d78;
  color:white;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}
.refresh-btn:active{
  transform:scale(0.98);
}
/* 設定 */
.setting-btn{
  width:56px;
  height:56px;
  border:none;
  border-radius:10px;
  background:#555;
  color:white;
  font-size:28px;
  cursor:pointer;
}
.setting-btn:active{
  transform:scale(0.98);
}
/* 中央 */
.header-controls{
  flex:0.7;
  min-width:0;
  display:flex;
  align-items:center;
  gap:10px;
  overflow-x:auto;
}
/* 後から追加するUI */
.control-btn,
.control-select,
.control-input{
  height:46px;
  border:none;
  border-radius:10px;
  padding:0 14px;
  background:#404040;
  color:white;
  font-size:18px;
}
/* タイトル */
.title{
  margin-left:auto;
  flex-shrink:0;
  font-size:24px;
  font-weight:bold;
  white-space:nowrap;
  text-align:right;
}
/* 原稿 */
.script-area{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  word-break:break-word;
  overflow-wrap:anywhere;
  padding:18px 22px;
  background:#202020;
  font-size:22px;
  line-height:1.8;
  min-height:0;   /* ←これも必須 */
  font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",sans-serif;
}
/* 下部 */
.footer{
  height:28px;
  display:flex;
  align-items:center;
  padding:0 10px;
  background:#262626;
  border-top:2px solid #444;
  font-size:13px;
  color:#ccc;
  flex-shrink:0
}
/* サイドバー */
.sidebar{
  width:210px;
  overflow-y:auto;
  background:#2c1f25;
  border-left:2px solid #444;
  padding:10px;
  min-height:0;   /* ←これ追加 */
}
/* サイドバーボタン */
.menu-btn{
  width:100%;
  min-height:64px;
  margin-bottom:10px;
  border:none;
  border-left:0px solid white;
  border-radius:12px;
  background:#5a3b46;
  color:white;
  font-size:21px;
  font-weight:bold;
  cursor:pointer;
  transition:0.15s;
}
.menu-btn:active{
  transform:scale(0.98);
}
.menu-btn.active{
  background:#b14f68;
  border-left:7px solid white;
}
/* スクロールバー */
::-webkit-scrollbar{
  width:10px;
  height:10px;
}
::-webkit-scrollbar-thumb{
  background:#666;
  border-radius:10px;
}
::-webkit-scrollbar-track{
  background:#222;
}
/* ポップアップ背景 */
.popup-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
/* ポップアップ */
.popup{
  width:500px;
  max-width:90vw;
  background:#2a2a2a;
  border:2px solid #555;
  border-radius:16px;
  overflow:hidden;
}
/* 上 */
.popup-header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 18px;
  background:#383838;
  font-size:22px;
  font-weight:bold;
}
/* × */
.popup-close{
  border:none;
  background:none;
  color:white;
  font-size:28px;
  cursor:pointer;
}
/* 中 */
.popup-body{
  padding:20px;
  font-size:18px;
  color:#ccc;
}
.toast{
  position: fixed;
  left: 14px;
  bottom: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 10px 10px 14px;
  border-radius: 10px;
  font-size: 14px;
  color: white;
  background: rgba(0,0,0,0.8);
  opacity: 0;
  transform: translateY(10px);
  transition: 0.2s;
  z-index: 9999;
  pointer-events: none;
}
.toast.show{
  opacity: 1;
  transform: translateY(0);
}
#toastText{
  white-space: pre-wrap;
}
#toastCopyBtn{
  margin-left: auto;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 14px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
  pointer-events: auto;
}
#toastCopyBtn:active{
  transform: scale(0.95);
}
.yellow-box {
  border: 2px solid #ff0;
  background: rgba(255, 235, 0, 0.08);
  padding: 10px;
  border-radius: 8px;
}
.marker-red {
  background: #ff0000;
  color: #fff;
  font-family: "Yu Gothic","BIZ UDPGothic",sans-serif;
  font-size: 40px;
  font-weight: 750;
  letter-spacing: 0.08em;
  line-height: 1;
  
  /* マーカーっぽさの核心 */
  padding: 6px 6px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}
body.loading {
  cursor: wait;
}
@keyframes headerFlash {
  0%   { background:rgba(255,255,0,0.9); color:#000; }
  50%  { background:rgba(255,255,0,0.2); color:inherit; }
  100% { background:rgba(255,255,0,0.9); color:#000; }
}
.header-flash{
  animation: headerFlash 0.5s ease 3;
}
.menu-btn.has-update{
  background:#ffd000;
  color:#000;
}
</style>

<script>
const isAppTest = false;

let fetchInterval = 3;
let updateMethod = "fetch";
let timer;
let isGenerating = false;
function updateTime(){
  const now = new Date();
  const week = ['日','月','火','水','木','金','土'];
  const y = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const w = week[now.getDay()];
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('date').textContent =`${y}/${mo}/${d}(${w})`;
  document.getElementById('time').textContent =`${h}:${m}:${s}`;
}
setInterval(updateTime, 1000);
updateTime();
</script>
<script>
function showMessage(text, bgColor="#3498db", textColor="#fff", sec=5){
  const el = document.getElementById("toast");
  const txt = document.getElementById("toastText");
  txt.textContent = text;
  el.dataset.text = text; // コピー用
  el.style.background = bgColor;
  el.style.color = textColor;
  el.classList.add("show");
  clearTimeout(el._timer);
  el._timer = setTimeout(() => {
    el.classList.remove("show");
  }, sec * 1000);
}

if (isAppTest===true) {
  alert("製作・テスト中です。\n実際のデータは表示していません。");
  showMessage("テストデータを表示しています。", "#3498db", "#fff", 5);
}
</script>

function runCurrentMode(isManual = false,flash=false){
  switch(currentMode){

/* モード別UI */
const headerControls = {

  eew_forecast: `<div id="announceInfo"></div>`,

function triggerFlash() {
  const el = document.getElementById("headerControls");
  if (!el) return;

  el.classList.remove("header-flash");
  void el.offsetWidth;
  el.classList.add("header-flash");

  el.addEventListener("animationend", () => {
    el.classList.remove("header-flash");
  }, { once:true });
}
/* 原稿変更 */
function setScript(html,flash = false){
  html = applyRuby(html);
  const script = document.getElementById('script');
  const newHtml = html.replaceAll("\n","<br>");
  if (script.innerHTML === newHtml) {
    return;
  }
  script.innerHTML = newHtml;
  if (flash) {
    triggerFlash();
  }
  if (scrollTopOnChange) {
    script.scrollTop = 0;
  }
}
function setFooter(fetch,ws) {
  if (fetch !== null) footerMessage.fetch = fetch;
  if (ws !== null) footerMessage.ws = ws;
  document.getElementById("footer").innerHTML =
    `接続状態: 【fetch】${footerMessage.fetch || "-"}　【ws】${footerMessage.ws || "-"}`;
}
/* 手動更新 */
function manualUpdate(){
  runCurrentMode(true,true);
}
function scrollToTopIfEnabled() {
  if (!scrollTopOnChange) return;
  document.getElementById("script").scrollTop = 0;
}
/* メニュー変更 */
function selectMenu(button, key){
  currentMode = key;

  document.querySelectorAll('.menu-btn').forEach(btn=>{
    btn.classList.remove('active');
  });

  button.classList.add('active');
  button.classList.remove('has-update'); // ←追加

  document.getElementById('title').textContent = titles[key] || '-';
  document.getElementById('headerControls').innerHTML = headerControls[key] || '';

  runCurrentMode(true,false);
}

function updateFetchInput(save = true){
  const select = document.getElementById("updateMethod");
  const input = document.getElementById("fetchInterval");
  updateMethod = select.value;

function formatDT_yyyyMMddHHmmssSSS(date = new Date()) {
  const y = date.getFullYear();
  const mo = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  const h = String(date.getHours()).padStart(2, "0");
  const m = String(date.getMinutes()).padStart(2, "0");
  const s = String(date.getSeconds()).padStart(2, "0");
  const ms = String(date.getMilliseconds()).padStart(3, "0");
  return `${y}/${mo}/${d} ${h}:${m}:${s}.${ms}`;
}
function formatDT_HHmm(str) {
  const match = str.match(/(\d{2}):(\d{2}):\d{2}/);
  if (!match) return "先ほど";
  return `${match[1]}時${match[2]}分頃`;
}
function formatDT_HHmm_TM(str) {
  const dt = new Date(str);
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dt);
  target.setHours(0,0,0,0);
  const diffDays = Math.round((target - today) / 86400000);
  let prefix = "";
  if (diffDays === 1) prefix = "明日の";
  else if (diffDays === 2) prefix = "明後日の";
  return `${prefix}${dt.getHours()}時${String(dt.getMinutes()).padStart(2, "0")}分頃`;
}

    text = text.replace(
      new RegExp(`${key}(?!（${ruby}）)`, "g"),
      `${key}（${ruby}）`
    );
  }

  for (const [key, ruby] of Object.entries(tsunamiRuby)) {
    text = text.replace(
      new RegExp(`${key}(?!（${ruby}）)`, "g"),
      `${key}（${ruby}）`
    );
  }

  return text;
}

function parseDate(str) {
  const [date, time] = str.split(" ");
  const [y, m, d] = date.split("/").map(Number);
  const [h, mi, s] = time.split(":").map(Number);
  return new Date(y, m - 1, d, h, mi, s);
}

    String(d.getMinutes()).padStart(2, "0")

}

function toFullWidth(str) {

}

/* 最新の地震 */
async function loadLatestQuake(data=null,flash=false){
  if (isLoading) return;
  setLoading(true);
  try {
    if (!data) {
      const res = await safeFetch(url_loadLatestQuake);
      if (res.ok) {
        setFooter(`<span style="color:#00e676">●</span>正常(P2P)／最終更新 ${formatDT_yyyyMMddHHmmssSSS()}`,null);
      } else {
        setFooter(`<span style="color:#ffb300">●</span>HTTP${res.status}エラー(P2P)／試行時刻 ${formatDT_yyyyMMddHHmmssSSS()}`,null);
        setScript(`読み込みでHTTP${res.status}エラーが発生しました。`);
        return;
      }
      const json = await res.json();
      data = json[0];
      if (!data) {
        setScript("新しい地震情報はありません。");
        return;
      }
    } else {
      setFooter(null,`<span style="color:#00e676">●</span>正常(P2P)／受信日時 ${formatDT_yyyyMMddHHmmssSSS()}`);
    }
    announceDT = data.issue.time;
    announceS = null;
    let message = "";

    const type = data.issue.type;
    if (type === "ScalePrompt") {
      const areas = {70:[],60:[],55:[],50:[],45:[],40:[],30:[]};
      const areaAmount = data.points.length;
      const maxScale = p2pToShido[data.earthquake.maxScale];
      if (areaAmount >= 12) {
        for (const area of data.points) {
          if (area.scale === data.earthquake.maxScale && !areas[area.scale].includes(area.addr)) {
            areas[area.scale].push(area.addr);
          } else if (!areas[area.scale].includes(area.pref)) {
            areas[area.scale].push(area.pref);
          }
        }
      } else {
        for (const area of data.points) {
          areas[area.scale].push(area.addr);
        }
      }
      // 各震度の配列を並び替え
      Object.values(areas).forEach(list => {
        list.sort((a, b) => {
          const ra = regionOrderIndex.get(a);
          const rb = regionOrderIndex.get(b);

          if (ra !== undefined && rb !== undefined) return ra - rb;
          if (ra !== undefined) return -1;
          if (rb !== undefined) return 1;

          const aa = areaOrderIndex.get(a);
          const ab = areaOrderIndex.get(b);

          if (aa !== undefined && ab !== undefined) return aa - ab;
          if (aa !== undefined) return -1;
          if (ab !== undefined) return 1;

          return 0;
        });
      });

      let areaScales = "";
      Object.entries(areas)
        .sort((a, b) => Number(b[0]) - Number(a[0]))
        .forEach(([scale, list]) => {
          if (!list.length) return;
          if (Number(scale) === data.earthquake.maxScale) return;
          areaScales += `\n震度${p2pToShido[scale]}を${list.join("、")}`;
        });
      if (areaScales) areaScales = "\n各地域ごとの震度情報をお伝えします。"+areaScales+"で観測しています。";
      if (data.earthquake.maxScale>45) areaScales += "\n\nこの地震による津波の有無は現在気象庁で調査中ですが、震源が海底の場合は津波が発生する可能性があります。沿岸部で長く強い揺れを感じた方は、念のため海から離れてください。";
      message = `震度の情報が入ってきました。
最大震度は震度${maxScale}、最大震度は震度${maxScale}です。

${formatDT_HHmm(data.earthquake.time)}、${areas[data.earthquake.maxScale].join("、")}で${p2pToScalePrompt[data.earthquake.maxScale]}。
${areaScales}`;
    } else if (type === "Destination") {
      const hypo = data.earthquake.hypocenter.name;
      let tsunamiText = "";
      switch (data.earthquake.domesticTsunami) {
        case "None":
          tsunamiText = "この地震による津波の心配はありません。";
          break;
        case "NonEffective":
          tsunamiText = "この地震により日本の沿岸では若干の海面変動があるかもしれませんが、被害の心配はありません。";
          break;
        case "Checking":
          tsunamiText = "この地震による津波の有無は、現在調査中です。";
          break;
        default:
          tsunamiText = "この地震による津波の有無は、現在わかっていません。";
      }
      let depth = data.earthquake.hypocenter.depth;
      if (depth===0) depth = "ごく浅い";
      else if (depth===-1) depth = "不明";
      else depth = String(depth) + "キロメートル";
      let magnitude = data.earthquake.hypocenter.magnitude.toFixed(1);
      if (magnitude===-1) magnitude = "不明";

        message = `新しい情報です、${tsunamiText}繰り返します、${tsunamiText}

${formatDT_HHmm(data.earthquake.time)}、${hypo}で地震が発生しました。
震源の深さは${depth}、地震の規模を示すマグニチュードは${magnitude}と推定されています。`;
    } else {
      const hypo = data.earthquake.hypocenter.name;
      let tsunamiText = "";
      switch (data.earthquake.domesticTsunami) {
        case "None":
          tsunamiText = "この地震による津波の心配はありません。";
          break;
        case "NonEffective":
          tsunamiText = "この地震により日本の沿岸では若干の海面変動があるかもしれませんが、被害の心配はありません。";
          break;
        case "Checking":
          tsunamiText = "この地震による津波の有無は、現在調査中です。";
          break;
        case "Watch":
        case "Warning":
          tsunamiText = "この地震により、津波の情報を発表しています。";
          break;
        default:
          tsunamiText = "この地震による津波の有無は、現在わかっていません。";
      }
      let depth = data.earthquake.hypocenter.depth;
      if (depth===0) depth = "ごく浅い";
      else if (depth===-1) depth = "不明";
      else depth = String(depth) + "キロメートル";
      let magnitude = data.earthquake.hypocenter.magnitude.toFixed(1);
      if (magnitude===-1) magnitude = "不明";

      message = `地震情報です。
${formatDT_HHmm(data.earthquake.time)}、最大震度${p2pToShido[data.earthquake.maxScale]}の地震が発生しました。

震源地は${hypo}、震源の深さは${depth}。
地震の規模を示すマグニチュードは${magnitude}と推定されています。
${tsunamiText}`;
    }

    setScript(toFullWidth(message),flash);
  } finally {
    setLoading(false);
  }
}

    const res = await safeFetch(url_loadAdmin);

    if (res.ok) {
      setFooter(`<span style="color:#00e676">●</span>正常(GAS_admin)／最終更新 ${formatDT_yyyyMMddHHmmssSSS()}`,null);
    } else {
      setFooter(`<span style="color:#ffb300">●</span>HTTP${res.status}エラー(GAS_admin)／試行時刻 ${formatDT_yyyyMMddHHmmssSSS()}`,null);
      setScript(`読み込みでHTTP${res.status}エラーが発生しました。`);
      return;
    }

    const data = await res.json();
    setScript(data.text || "原稿なし");
  }catch(error){
    console.error(error);
    setScript('原稿の取得に失敗しました\n\n'+error);
  } finally {
    setLoading(false);
  }
}
/* 設定開く */
function openSettings(){
  document.getElementById('settingsOverlay').style.display = 'flex';
  updateFetchInput();
}
/* 背景クリック */
function closeSettings(event){
  if(event.target.id === 'settingsOverlay'){
    forceCloseSettings();
  }
}
/* 閉じる */
function forceCloseSettings(){
  document.getElementById('settingsOverlay').style.display = 'none';
}

function restoreState(){
  // 設定取得
  updateMethod = localStorage.getItem("updateMethod") || "fetch";
  fetchInterval = Number(localStorage.getItem("fetchInterval") || 5);
  autoTabSwitch = localStorage.getItem("autoTabSwitch") !== "false";
  scrollTopOnChange = localStorage.getItem("scrollTopOnChange") !== "false";
  // UI反映
  document.getElementById("updateMethod").value = updateMethod;
  document.getElementById("fetchInterval").value = fetchInterval;
  document.getElementById("autoTabSwitch").checked = autoTabSwitch;
  document.getElementById("scrollTopOnChange").checked = scrollTopOnChange;
  // fetch UI状態更新
  updateFetchInput(false);
  // fetch動作復帰
  applyUpdateMethod();
  // WebSocket復帰
  connectWS();
}
function applyUpdateMethod(){
  if (timer) clearInterval(timer);

  if (updateMethod === "fetch") {
    fetch_setInterval();
  }
}
/* 初期表示 */
window.onload = async () => {
  restoreState();
  cities = await fetchCities();

  const firstButton = document.querySelector(".menu-btn");
  selectMenu(firstButton, "eew_warning");
};

document.getElementById("fetchInterval").addEventListener("change", () => {
  fetchInterval = Number(document.getElementById("fetchInterval").value);
  localStorage.setItem("fetchInterval", fetchInterval);
  applyUpdateMethod();
});
document.getElementById("autoTabSwitch").addEventListener("change", () => {
  autoTabSwitch = document.getElementById("autoTabSwitch").checked;
  localStorage.setItem("autoTabSwitch", autoTabSwitch);
});
document.getElementById("scrollTopOnChange").addEventListener("change", () => {
  scrollTopOnChange = document.getElementById("scrollTopOnChange").checked;
  localStorage.setItem("scrollTopOnChange", scrollTopOnChange);
});

function fetch_setInterval() {
  if (timer) clearInterval(timer);
  if (updateMethod !== "fetch") return;

  timer = setInterval(() => {
    if (currentMode === "admin") return;
    runCurrentMode(false,true);
  },fetchInterval * 1000);
}

window.onerror = function(message, source, lineno, colno, error){
  showMessage(
    `[JSエラー]\n${message}\n${source}:${lineno}:${colno}`,
    "#e74c3c",
    "#fff",
    10
  );
};

window.addEventListener("unhandledrejection", function(event){
  showMessage(
    `[Promise未処理エラー]\n${event.reason}`,
    "#e74c3c",
    "#fff",
    10
  );
});

function copyToast(){
  const el = document.getElementById("toast");
  const text = el.dataset.text || "";
  navigator.clipboard.writeText(text)
    .then(() => {
      showMessage("トーストメッセージをコピーしました", "#2ecc71", "#000", 1.5);
    })
    .catch(() => {
      showMessage("コピー失敗", "#e74c3c", "#fff", 2);
    });
}
//ws処理
let ws;
let reconnectTimer = null;
function connectWS() {
  if (ws) {
    ws.onclose = null;
    ws.close();
  }
  ws = new WebSocket(url_ws);
  ws.onopen = () => {
    console.log("WS接続");
    setFooter(null, '<span style="color:#00e676">●</span>正常');
    showMessage("WebSocketに接続しました。","#00c853","#fff",2);
  };
  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (!data) return;
      if (data.code===556) {//緊急地震速報（警報）
        if (lastEEWEventId === data.issue.eventId) {
          if (currentMode === 'eew_warning') {
            loadEEWWarning(data,true);
          };
          return;
        } else {
          lastEEWEventId = data.issue.eventId;
          if (autoTabSwitch===false) {
            if (currentMode === 'eew_warning') {
              loadEEWWarning(data,true);
            }
            return;
          };
        }
        currentMode = "eew_warning";
        document.querySelectorAll(".menu-btn").forEach(btn => {
          btn.classList.remove("active");
        });
        document.querySelector('.menu-btn[data-mode="eew_warning"]').classList.add("active");
        document.getElementById("title").textContent = titles.eew_warning || "-";
        document.getElementById("headerControls").innerHTML = headerControls.eew_warning || "";
        loadEEWWarning(data,true);
        showMessage("緊急地震速報（警報）が発表されたため、タブを切り替えました。","#ffb300","#000",5);
      }
      if (data.code===552) {//津波予報
        if (lastTsunamiEventId === data.id) {
          if (currentMode === 'tsunami_arrival') {
            loadTsunamiArrival(data,true);
          };
          return;
        } else {
          lastTsunamiEventId = data.id;
          if (autoTabSwitch===false) {
            if (currentMode === 'tsunami_arrival') {
              loadTsunamiArrival(data,true);
            }
            return;
          }
        }
        currentMode = "tsunami_arrival";
        document.querySelectorAll(".menu-btn").forEach(btn => {
          btn.classList.remove("active");
        });
        document.querySelector('.menu-btn[data-mode="tsunami_arrival"]').classList.add("active");
        document.getElementById("title").textContent = titles.tsunami_arrival || "-";
        document.getElementById("headerControls").innerHTML = headerControls.tsunami_arrival || "";
        loadTsunamiArrival(data,true);
        showMessage("津波情報が発表されたため、タブを切り替えました。","#ffb300","#000",5);
      }
      if (data.code===551) {//地震情報
        if (currentMode === 'latest_quake') {
          loadLatestQuake(data,true);
        } else {
          document.querySelector('.menu-btn[data-mode="latest_quake"]').classList.add("has-update");
        }
      }
    } catch (e) {
      showMessage("[WebSocket ERROR]\n"+ e,"#e74c3c","#fff",5);
    }
  };
  ws.onerror = (err) => {
    console.error(err);
    setFooter(null, '<span style="color:#ff5252">●</span>エラー');
    showMessage(`WebSocket通信エラー\n${String(err)}`,"#e74c3c","#fff",5);
  };
  ws.onclose = () => {
    setFooter(
      null,
      '<span style="color:#ffb300">●</span>切断・再接続を試行中'
    );
    showMessage("WebSocketとの接続が切断されました。\n再接続します。","#ffb300","#000",3);
    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connectWS, 1500);
  };
}
function updateAnnounceInfo() {
  const el = document.getElementById("announceInfo");
  if (!el) return;

  if (!announceDT) {
    el.innerHTML = "";
    return;
  }

  const elapsedSec = Math.floor(
    (Date.now() - parseDate(announceDT).getTime()) / 1000
  );

  const min = Math.floor(elapsedSec / 60);
  const sec = elapsedSec % 60;
el.innerHTML = `
  <div style="
    font-size:20px;
    color:#00ffff;
    font-family:'Hiragino Maru Gothic ProN','BIZ UDPGothic','Yu Gothic',sans-serif;
  ">${announceDT.slice(11,19)}発表${announceS ?? ""}</div>
  <div style=" font-size:14px; color:#ccc;">${min}分${sec}秒経過</div>`;
}
setInterval(updateAnnounceInfo, 1000);
